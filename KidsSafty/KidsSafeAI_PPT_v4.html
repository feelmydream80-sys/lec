<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsSafe AI — 발표자료</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #060608;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: rgba(255,255,255,0.35);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    width: 100vw; height: 100vh;
}
.bg-grid {
    position: fixed; inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
}
.progress-track {
    position: fixed; top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.06);
    z-index: 100;
}
#progress-bar {
    height: 100%;
    width: 5%;
    transition: width 0.3s ease;
}
.slide-counter {
    position: fixed; top: 24px; right: 32px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    z-index: 100;
    letter-spacing: 0.15em;
}
.cat-label {
    position: fixed; top: 24px; left: 32px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    z-index: 100;
    letter-spacing: 0.2em;
}
.nav-btn {
    position: fixed; bottom: 32px;
    z-index: 100;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 12px 24px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.2s ease;
}
.nav-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.08);
    color: white;
    border-color: rgba(255,255,255,0.2);
}
.nav-btn:disabled { opacity: 0.15; cursor: default; }
.prev-btn { left: 32px; }
.next-btn { right: 32px; background: white; color: black; border-color: white; }
.next-btn:hover:not(:disabled) { background: rgba(255,255,255,0.85); color: black; }
.slide {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    padding: 80px 48px 80px;
    z-index: 10;
}
.slide.active { display: flex; }
.card {
    width: 100%;
    max-width: 960px;
    min-height: 480px;
    background: rgba(12,12,16,0.85);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 56px 64px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    justify-content: center;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 40px 80px rgba(0,0,0,0.6);
}
.card::before {
    content: '';
    position: absolute;
    top: 0; left: 56px; right: 56px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-color, white), transparent);
    opacity: 0.4;
}
.bg-number {
    position: absolute;
    bottom: -20px; right: 40px;
    font-family: 'Space Mono', monospace;
    font-size: 200px;
    font-weight: 700;
    color: rgba(255,255,255,0.025);
    line-height: 1;
    pointer-events: none;
    letter-spacing: -0.05em;
}
.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    margin-bottom: 28px;
    border: 1px solid;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; }
.slide-title {
    font-size: 36px;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 10px;
}
.slide-sub {
    font-size: 13px;
    font-size: clamp(13px, 1.8vw, 17px);
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: 0.03em;
}
.slide-desc {
    font-size: 14px;
    font-size: clamp(14px, 1.8vw, 19px);
    line-height: 1.7;
    color: rgba(255,255,255,0.78);
    font-weight: 300;
    max-width: 720px;
}
.cmd-box {
    margin-top: 32px;
    display: inline-flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 22px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    border-left: 3px solid var(--accent-color, rgba(255,255,255,0.3));
}
.cmd-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.25);
}
.cmd-text {
    font-family: 'Space Mono', monospace;
    font-size: clamp(12px, 1.4vw, 15px);
    font-weight: 700;
}
.kbd-hint {
    position: fixed;
    bottom: 38px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.15em;
    z-index: 100;
}
ul { list-style: none; margin: 12px 0; }
ul li { position: relative; padding-left: 20px; margin-bottom: 6px; text-align: left; }
ul li::before { content: '›'; position: absolute; left: 0; font-weight: 700; }
.desc-list { font-size: clamp(13px, 1.6vw, 17px); line-height: 1.7; color: rgba(255,255,255,0.78); font-weight: 300; text-align: center; }
.desc-list strong { color: var(--accent-color, #fff); font-weight: 700; }
.desc-list em { font-style: normal; color: rgba(255,255,255,0.4); font-size: 0.85em; }
.table-wrap { width: 100%; max-width: 800px; margin: 16px auto 0; }
.table-wrap table { width: 100%; border-collapse: collapse; font-size: clamp(11px, 1.3vw, 14px); }
.table-wrap th { background: rgba(52,152,219,0.2); padding: 8px 10px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
.table-wrap td { padding: 6px 10px; border: 1px solid rgba(255,255,255,0.06); text-align: center; color: rgba(255,255,255,0.7); }
.table-wrap tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.code-box {
    margin-top: 16px;
    padding: 10px 18px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: clamp(11px, 1.2vw, 13px);
    color: var(--accent-color, #7eb8ff);
    text-align: center;
}
@media print {
    @page { margin: 0; size: landscape; }
    body { overflow: visible; width: auto; height: auto; background: #060608 !important; }
    .bg-grid { display: none !important; }
    .progress-track, .slide-counter, .cat-label, .nav-btn, .kbd-hint { display: none !important; }
    .slide {
        display: flex !important;
        position: relative !important;
        inset: auto !important;
        width: 100vw;
        height: 100vh;
        page-break-after: always;
        page-break-inside: avoid;
        padding: 40px 48px;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    .slide.active { display: flex !important; }
    .card {
        box-shadow: none !important;
        border: 1px solid rgba(255,255,255,0.15) !important;
        min-height: 400px;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    .bg-number { display: block !important; }
    img { max-height: 50vh; object-fit: contain; }
}
</style>
</head>

function wrapSlide(s, i) {
    const catStyle = `color:${s.accent};border-color:${s.accent}33;background:${s.accent}0d`;
    const dotStyle = `background:${s.accent}`;
    return `<section class="slide" id="slide-${i}" style="--accent-color:${s.accent}">
        <div class="card" style="--accent-color:${s.accent}">
            <div class="bg-number">${s.num}</div>
            <div class="badge" style="${catStyle}"><span class="badge-dot" style="${dotStyle}"></span>${s.cat}</div>
            <h2 class="slide-title">${s.title}</h2>
            <p class="slide-sub">${s.sub}</p>
            <p class="slide-desc">${s.desc}</p>
            <div class="cmd-box" style="--accent-color:${s.accent};border-left-color:${s.accent}">
                <span class="cmd-label">KidsSafe Command</span>
                <span class="cmd-text" style="color:${s.accent}">${s.cmd}</span>
            </div>
        </div>
    </section>`;
}

// Render
const container = document.getElementById('slides');
slides.forEach((s, i) => { container.innerHTML += wrapSlide(s, i); });

const total = slides.length;
document.getElementById('tot-num').textContent = total < 10 ? '0' + total : total;

let current = 0;
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const curNum = document.getElementById('cur-num');
const catLabel = document.getElementById('cat-label');
const progBar = document.getElementById('progress-bar');

function goTo(idx) {
    document.querySelectorAll('.slide').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
    });
    current = idx;
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === total - 1;
    curNum.textContent = (idx + 1) < 10 ? '0' + (idx + 1) : (idx + 1);
    catLabel.textContent = slides[idx].cat;
    progBar.style.width = ((idx + 1) / total * 100) + '%';
}

function prev() { if (current > 0) goTo(current - 1); }
function next() { if (current < total - 1) goTo(current + 1); }

prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
});

goTo(0);
</script>
