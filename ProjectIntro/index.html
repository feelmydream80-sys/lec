<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 소개</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: rgba(255,255,255,0.35);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
.glow-orb {
  position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.1;
}
.glow-1 { width: 500px; height: 500px; top: -150px; left: -150px; background: #48dbfb; }
.glow-2 { width: 400px; height: 400px; bottom: -150px; right: -150px; background: #c77dff; }
.container {
  position: relative; z-index: 1;
  width: 100%; max-width: 960px;
  padding: 60px 32px 48px;
}
.header {
  text-align: center; margin-bottom: 48px;
}
.header h1 {
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 900; letter-spacing: -0.03em;
  margin-bottom: 8px;
}
.header h1 span { color: #48dbfb; }
.header p {
  font-size: 15px; color: var(--muted);
  font-weight: 300; letter-spacing: 0.03em;
  line-height: 1.7;
  max-width: 520px;
  margin: 0 auto;
}
.project-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.project-card {
  background: rgba(12,12,16,0.85);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px 24px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(40px);
  transition: all 0.3s ease;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
}
.project-card::before {
  content: '';
  position: absolute;
  top: 0; left: 24px; right: 24px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent, #48dbfb), transparent);
  opacity: 0.5;
}
.project-card:hover {
  border-color: rgba(255,255,255,0.15);
  transform: translateY(-3px);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 20px 40px rgba(0,0,0,0.4);
}
.project-card:active {
  transform: translateY(-1px);
}
.card-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin-bottom: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
}
.card-title {
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 2px;
}
.card-sub {
  font-size: 12px; color: var(--muted);
  font-weight: 300; line-height: 1.6;
  margin-bottom: 12px;
  flex: 1;
}
.card-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 3px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  border: 1px solid var(--border);
  align-self: flex-start;
}
.back-link {
  text-align: center;
  margin-top: 40px;
}
.back-link a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.4);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: all 0.2s ease;
  text-transform: uppercase;
}
.back-link a:hover {
  background: rgba(255,255,255,0.06);
  color: white;
  border-color: rgba(255,255,255,0.2);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
.anim-1 { animation-delay: 0.05s; }
.anim-2 { animation-delay: 0.12s; }
.anim-3 { animation-delay: 0.2s; }
.anim-4 { animation-delay: 0.3s; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"><div class="glow-orb glow-1"></div><div class="glow-orb glow-2"></div></div>
<div class="container">
  <div class="header anim anim-1">
    <h1><span>프로젝트</span> 소개</h1>
    <p>바이브 코딩으로 만든 프로젝트들과<br>그 외 다양한 작업물들을 소개합니다</p>
  </div>
  <div class="project-grid" id="project-grid"></div>
  <div class="back-link anim anim-4">
    <a href="../">← LEC 강의실로 돌아가기</a>
  </div>
</div>
<script>
const projects = [
  {
    name: 'Power Papers',
    desc: '전력·에너지 분야 최신 arXiv 논문을<br>한국어 요약과 함께 큐레이션',
    url: 'https://feelmydream.pythonanywhere.com/',
    accent: '#4fffb0',
    icon: '⚡',
    tag: 'Python · Flask'
  },
  {
    name: '상산고 급식 영양 분석',
    desc: '박민수 학생 작품 — AI로 급식 메뉴의<br>영양 성분을 분석하는 서비스',
    url: 'https://feelmydream80-sys.github.io/sangsan_meal/',
    accent: '#ffca3a',
    icon: '🍱',
    tag: 'HTML · CSS · JS'
  },
  {
    name: 'Kids Safe AI',
    desc: 'AI로 아이 안전을 지키는<br>스마트 안전 지킴이 앱',
    url: 'https://github.com/feelmydream80-sys/kidssafty',
    accent: '#ff6b6b',
    icon: '🛡️',
    tag: 'Python'
  },
  {
    name: 'EMF Calculator',
    desc: '전자파 수치를 계산해주는<br>웹 기반 전자파 계산기',
    url: 'https://github.com/feelmydream80-sys/EMF-Calculator',
    accent: '#c77dff',
    icon: '🧮',
    tag: 'JavaScript · HTML'
  }
];

const grid = document.getElementById('project-grid');
projects.forEach((p, i) => {
  const card = document.createElement('a');
  card.href = p.url;
  card.target = '_blank';
  card.rel = 'noopener';
  card.className = 'project-card anim anim-' + Math.min(i + 1, 4);
  card.style.setProperty('--accent', p.accent);
  card.innerHTML =
    '<div class="card-icon" style="color:' + p.accent + '">' + p.icon + '</div>' +
    '<div class="card-title" style="color:' + p.accent + '">' + p.name + '</div>' +
    '<div class="card-sub">' + p.desc + '</div>' +
    '<div class="card-tag">' + p.tag + '</div>';
  grid.appendChild(card);
});
</script>
</body>
</html>
