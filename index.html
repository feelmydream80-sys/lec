<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEC 강의실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #0071E3;
  --accent-light: rgba(0,113,227,0.08);
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --surface2: #FAFAFA;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.13);
  --text: #1D1D1F;
  --sub: #6E6E73;
  --muted: #AEAEB2;
  --teal: #34C759;
  --teal-bg: rgba(52,199,89,0.1);
  --font-sans: -apple-system, 'SF Pro Display', 'Helvetica Neue', 'Noto Sans KR', sans-serif;
  --font-mono: 'Space Mono', 'SF Mono', 'Menlo', monospace;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
nav {
  flex-shrink: 0;
  height: 52px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  position: relative; z-index: 2;
}
.logo {
  font-size: 15px; font-weight: 700; color: #fff;
  letter-spacing: -0.3px;
  text-decoration: none;
}
.tabs { display: flex; gap: 0; list-style: none; }
.tab-btn {
  background: none; border: none;
  font-family: var(--font-sans); font-size: 13px; font-weight: 400;
  color: rgba(255,255,255,0.55); padding: 6px 14px;
  border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all 0.15s;
  letter-spacing: -0.1px;
}
.tab-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
.tab-btn.active { color: #fff; font-weight: 600; background: rgba(0,113,227,0.25); }
.tab-btn .cnt {
  font-size: 10px; font-weight: 600;
  background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6);
  padding: 1px 6px; border-radius: 99px; line-height: 1.7;
}
.tab-btn.active .cnt { background: #0071E3; color: #fff; }

/* PAGES */
.pages { flex: 1; overflow: hidden; position: relative; z-index: 1; }
.page {
  position: absolute; inset: 0;
  overflow-y: auto; padding: 28px 32px;
  display: none; flex-direction: column; gap: 14px;
  animation: fadein 0.2s ease;
}
.page.active { display: flex; }
@keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

/* HERO */
.hero {
  background: var(--surface);
  border-radius: 16px;
  border: 0.5px solid var(--border-strong);
  padding: 28px 28px 28px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
  backdrop-filter: blur(40px);
}
.hero-text p {
  font-size: 12px; font-weight: 400; color: var(--muted);
  letter-spacing: 0.2px; margin-bottom: 6px;
}
.hero-text h1 {
  font-size: 22px; font-weight: 700; color: var(--text);
  letter-spacing: -0.6px; line-height: 1.25;
}
.qr-box {
  flex-shrink: 0;
  width: 120px; height: 120px;
  border-radius: 14px;
  border: 0.5px solid var(--border-strong);
  padding: 8px;
  background: white;
}
.qr-box img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; display: block; }

/* QUICK CARDS */
.quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.quick-card {
  background: var(--surface); border-radius: 14px;
  border: 0.5px solid var(--border-strong);
  padding: 18px 16px 16px;
  display: flex; flex-direction: column; gap: 3px;
  cursor: pointer; transition: all 0.18s;
  overflow: hidden;
  position: relative;
  backdrop-filter: blur(40px);
}
.quick-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color, var(--accent)); opacity: 0.7;
}
.quick-card:hover { background: var(--surface2); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.quick-card:active { transform: scale(0.98); }
.q-label { font-size: 12px; font-weight: 500; color: var(--sub); letter-spacing: -0.1px; margin-bottom: 8px; }
.q-num { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -1px; line-height: 1; }
.q-unit { font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }
.q-arrow { font-size: 13px; color: var(--accent); margin-top: 10px; font-weight: 500; }

/* URL BAR */
.url-bar {
  background: var(--surface); border-radius: 12px;
  border: 0.5px solid var(--border-strong);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  backdrop-filter: blur(40px);
}
.url-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; flex-shrink: 0; }
.url-text { font-family: var(--font-mono); font-size: 22px; color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.copy-btn {
  flex-shrink: 0; font-size: 13px; font-weight: 500;
  background: var(--accent); color: white;
  border: none; border-radius: 8px;
  padding: 6px 14px; cursor: pointer;
  font-family: var(--font-sans); letter-spacing: -0.1px;
  transition: opacity 0.15s;
}
.copy-btn:hover { opacity: 0.85; }

/* SCROLL SECTION */
.scroll-section { display: flex; flex-direction: column; gap: 10px; }
.sec-head { display: flex; align-items: center; gap: 7px; padding: 0 2px; }
.sec-title { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
.sec-cnt {
  font-size: 10px; font-weight: 600;
  background: rgba(0,0,0,0.06); color: var(--sub);
  padding: 1px 7px; border-radius: 99px;
}
.scroll-row {
  display: flex; gap: 10px;
  overflow-x: auto; overflow-y: visible;
  padding-bottom: 2px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.scroll-row::-webkit-scrollbar { display: none; }

/* H-CARD */
.h-card {
  flex-shrink: 0; width: 200px;
  background: var(--surface);
  border: 0.5px solid var(--border-strong);
  border-radius: 14px; padding: 16px;
  display: flex; flex-direction: column; gap: 5px;
  cursor: pointer; transition: all 0.18s;
  overflow: hidden; position: relative;
  backdrop-filter: blur(40px);
}
.h-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color, var(--accent));
  opacity: 0.7;
}
.h-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.h-card:active { transform: scale(0.98); }
.h-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.h-card-icon { font-size: 20px; }
.h-card-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
.h-card-desc { font-size: 11px; color: var(--sub); line-height: 1.55; }

.status { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; letter-spacing: 0.1px; }
.status.on { background: var(--teal-bg); color: var(--teal); }
.status.soon { background: rgba(0,0,0,0.05); color: var(--muted); }

.empty-hcard {
  flex-shrink: 0; width: 200px; height: 96px;
  background: var(--surface); border: 0.5px dashed var(--border-strong);
  border-radius: 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
}
.empty-hcard p { font-size: 11px; color: var(--muted); }
.empty-hcard span { font-size: 11px; font-weight: 500; color: var(--sub); }

/* OTHER PAGES */
.page-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); margin-bottom: 4px; }

.empty-box {
  background: var(--surface); border: 0.5px dashed var(--border-strong);
  border-radius: 16px; padding: 60px 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; text-align: center;
}
.empty-box .ei { font-size: 32px; margin-bottom: 4px; }
.empty-box .et { font-size: 14px; font-weight: 600; color: var(--text); }
.empty-box .es { font-size: 12px; color: var(--sub); }

/* COURSE GRID (tab) */
.course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.course-card {
  background: var(--surface); border: 0.5px solid var(--border-strong);
  border-radius: 14px; padding: 24px 20px 20px;
  display: flex; flex-direction: column; gap: 6px;
  cursor: pointer; transition: all 0.18s;
  overflow: hidden; position: relative;
  text-decoration: none; color: inherit;
  backdrop-filter: blur(40px);
}
.course-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color, var(--accent));
  opacity: 0.7;
}
.course-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.course-card:active { transform: scale(0.98); }
.course-top { display: flex; justify-content: space-between; align-items: flex-start; }
.course-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: var(--surface2); border: 0.5px solid var(--border); }
.course-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
.course-desc { font-size: 12px; color: var(--sub); line-height: 1.55; flex: 1; }

/* PROJECT GRID */
.proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.proj-card {
  background: var(--surface); border: 0.5px solid var(--border-strong);
  border-radius: 14px; padding: 20px 18px 18px;
  display: flex; flex-direction: column; gap: 6px;
  cursor: pointer; transition: all 0.18s;
  overflow: hidden; position: relative;
  text-decoration: none; color: inherit;
  backdrop-filter: blur(40px);
}
.proj-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color, var(--accent));
  opacity: 0.7;
}
.proj-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.proj-card:active { transform: scale(0.98); }
.proj-top { display: flex; justify-content: space-between; align-items: flex-start; }
.proj-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: var(--surface2); border: 0.5px solid var(--border); }
.proj-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
.proj-desc { font-size: 12px; color: var(--sub); line-height: 1.55; }
.proj-tag {
  font-size: 10px; font-weight: 500;
  color: var(--muted); margin-top: 4px;
  font-family: var(--font-mono);
}

/* ACCESS */
.access-card {
  background: var(--surface); border: 0.5px solid var(--border-strong);
  border-radius: 16px; padding: 28px;
  display: flex; gap: 28px; align-items: center; max-width: 640px;
  backdrop-filter: blur(40px);
  position: relative; overflow: hidden;
}
.access-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color, var(--accent)); opacity: 0.7;
}
.access-qr { width: 180px; height: 180px; border-radius: 14px; border: 0.5px solid var(--border-strong); padding: 8px; flex-shrink: 0; background: white; }
.access-qr img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; display: block; }
.access-info h2 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; margin-bottom: 5px; }
.access-info p { font-size: 12px; color: var(--sub); margin-bottom: 12px; line-height: 1.6; }
.access-url { font-family: var(--font-mono); font-size: 12px; color: var(--accent); background: var(--accent-light); padding: 8px 12px; border-radius: 8px; display: block; word-break: break-all; }

/* DUCK SCENE */
.duck-scene {
  position: relative;
  width: 100%;
  height: 56px;
  margin-top: 8px;
  overflow: hidden;
}
.ground-line {
  position: absolute;
  bottom: 4px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,113,227,0.08), transparent);
}
.duck {
  position: absolute;
  bottom: 4px;
  animation: duck-walk 16s linear infinite;
}
.duck.mom   { animation-delay: -11s; z-index: 4; }
.duck.baby1 { animation-delay: -8s;  z-index: 3; }
.duck.baby2 { animation-delay: -5s;  z-index: 2; }
.duck.baby3 { animation-delay: -2s;  z-index: 1; }
.duck-inner { animation: duck-bob 0.6s ease-in-out infinite; }
.duck.mom   .duck-inner { animation-delay: 0s; }
.duck.baby1 .duck-inner { animation-delay: 0.15s; }
.duck.baby2 .duck-inner { animation-delay: 0.35s; }
.duck.baby3 .duck-inner { animation-delay: 0.5s; }
.duck-body {
  border-radius: 50%; background: #ffca3a; position: relative;
}
.duck.mom .duck-body { width: 32px; height: 22px; }
.duck.baby .duck-body { width: 20px; height: 14px; }
.duck-head {
  position: absolute; border-radius: 50%; background: #ffca3a;
}
.duck.mom .duck-head { width: 16px; height: 16px; top: -10px; left: 14px; }
.duck.baby .duck-head { width: 10px; height: 10px; top: -6px; left: 9px; }
.duck-eye {
  position: absolute; border-radius: 50%; background: #1a1a2e;
}
.duck.mom .duck-eye { width: 2.5px; height: 2.5px; top: 4px; left: 10px; }
.duck.baby .duck-eye { width: 1.5px; height: 1.5px; top: 3px; left: 6px; }
.duck-beak {
  position: absolute; width: 0; height: 0;
  border-left: 4px solid transparent; border-right: 4px solid transparent;
  border-bottom: 5px solid #ff9f43;
}
.duck.mom .duck-beak { top: 6px; left: 24px; }
.duck.baby .duck-beak { top: 4px; left: 16px; border-left-width: 3px; border-right-width: 3px; border-bottom-width: 3px; }
.duck-wing {
  position: absolute; border-radius: 50%; background: rgba(0,0,0,0.06);
}
.duck.mom .duck-wing { width: 14px; height: 9px; top: 7px; left: 5px; }
.duck.baby .duck-wing { width: 9px; height: 6px; top: 4px; left: 3px; }
@keyframes duck-walk {
  0%   { transform: translateX(-100px); opacity: 0; }
  6%   { opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translateX(calc(100% + 50px)); opacity: 0; }
}
@keyframes duck-bob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}

/* HIDDEN DUCKS */
.hidden-duck {
  position: absolute;
  cursor: pointer;
  z-index: 5;
  transition: opacity 0.4s;
}
.hidden-duck:hover { opacity: 0.5 !important; }
.hidden-duck.found { pointer-events: none; z-index: 6; }
.hd-body {
  border-radius: 50%;
  background: #ffca3a;
  position: relative;
}
.hd-body.s { width: 7px; height: 5px; }
.hd-body.m { width: 9px; height: 6px; }
.hd-body.l { width: 11px; height: 7px; }
.hd-head {
  position: absolute;
  border-radius: 50%;
  background: #ffca3a;
}
.hd-body.s .hd-head { width: 4px; height: 4px; top: -3px; left: 4px; }
.hd-body.m .hd-head { width: 5px; height: 5px; top: -4px; left: 5px; }
.hd-body.l .hd-head { width: 6px; height: 6px; top: -5px; left: 6px; }
.hd-beak {
  position: absolute;
  width: 0; height: 0;
  border-left: 2px solid transparent;
  border-right: 2px solid transparent;
  border-bottom: 3px solid #ff9f43;
}
.hd-body.s .hd-beak { top: 1px; left: 7px; border-left-width: 1.5px; border-right-width: 1.5px; border-bottom-width: 2px; }
.hd-body.m .hd-beak { top: 1px; left: 8px; }
.hd-body.l .hd-beak { top: 1px; left: 10px; border-left-width: 2.5px; border-right-width: 2.5px; border-bottom-width: 3.5px; }
.hd-found {
  display: none;
  font-size: 16px;
  transform: translate(-50%, -50%);
}
.hidden-duck.found .hd-body { display: none; }
.hidden-duck.found .hd-found { display: block; }
.gotcha-text {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: #ff9f43;
  text-shadow: 0 0 8px rgba(255,159,67,0.5);
  pointer-events: none;
  z-index: 10;
  animation: gotcha-pop 1s ease-out forwards;
}
@keyframes gotcha-pop {
  0%   { opacity: 1; transform: translateY(0) scale(0.5); }
  40%  { opacity: 1; transform: translateY(-24px) scale(1.3); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}
</style>
</head>
<body>
<nav>
  <a class="logo" href="#">LEC</a>
  <ul class="tabs">
    <li><button class="tab-btn active" data-tab="home">홈</button></li>
    <li><button class="tab-btn" data-tab="lectures">강의 <span class="cnt" id="tab-course-cnt">0</span></button></li>
    <li><button class="tab-btn" data-tab="projects">프로젝트 <span class="cnt">4</span></button></li>
    <li><button class="tab-btn" data-tab="access">접속 안내</button></li>
  </ul>
</nav>

<div class="pages">

  <!-- HOME -->
  <div class="page active" id="page-home">

    <div class="hero">
      <div class="hero-text">
        <p>AI 시대, 당신의 아이디어를</p>
        <h1>현실로 만드는<br>강의실</h1>
      </div>
      <div class="qr-box"><img src="28qiO.jpg" alt="QR"></div>
    </div>

    <div class="quick-grid">
      <div class="quick-card" style="--card-color:#0071E3" onclick="goTab('lectures')">
        <span class="q-label">강의</span>
        <span class="q-num" id="quick-course-cnt">0</span>
        <span class="q-unit">등록된 강의</span>
        <span class="q-arrow">자세히 보기 →</span>
      </div>
      <div class="quick-card" style="--card-color:#34C759" onclick="goTab('projects')">
        <span class="q-label">프로젝트</span>
        <span class="q-num">4</span>
        <span class="q-unit">바이브 코딩 결과물</span>
        <span class="q-arrow">자세히 보기 →</span>
      </div>
      <div class="quick-card" style="--card-color:#FF9F0A" onclick="goTab('access')">
        <span class="q-label">접속 안내</span>
        <span class="q-num" style="font-size:18px; margin-top:4px;">QR · URL</span>
        <span class="q-unit">강의실 바로가기</span>
        <span class="q-arrow">접속하기 →</span>
      </div>
    </div>

    <div class="url-bar">
      <span class="url-label">URL</span>
      <span class="url-text">https://feelmydream80-sys.github.io/lec/</span>
      <button class="copy-btn" onclick="navigator.clipboard.writeText('https://feelmydream80-sys.github.io/lec/').then(()=>{this.textContent='복사됨';setTimeout(()=>this.textContent='복사',1500)})">복사</button>
    </div>

    <div class="scroll-section">
      <div class="sec-head">
        <span class="sec-title">강의</span>
        <span class="sec-cnt" id="scroll-course-cnt">0</span>
      </div>
      <div class="scroll-row" id="home-course-row">
      </div>
    </div>

    <div class="scroll-section">
      <div class="sec-head">
        <span class="sec-title">프로젝트</span>
        <span class="sec-cnt">4</span>
      </div>
      <div class="scroll-row" id="home-proj-row">
      </div>
    </div>

    <div class="duck-scene">
      <div class="ground-line"></div>
      <div class="duck mom">
        <div class="duck-inner">
          <div class="duck-body">
            <div class="duck-wing"></div>
            <div class="duck-head">
              <div class="duck-eye"></div>
              <div class="duck-beak"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="duck baby baby1">
        <div class="duck-inner">
          <div class="duck-body">
            <div class="duck-wing"></div>
            <div class="duck-head">
              <div class="duck-eye"></div>
              <div class="duck-beak"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="duck baby baby2">
        <div class="duck-inner">
          <div class="duck-body">
            <div class="duck-wing"></div>
            <div class="duck-head">
              <div class="duck-eye"></div>
              <div class="duck-beak"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="duck baby baby3">
        <div class="duck-inner">
          <div class="duck-body">
            <div class="duck-wing"></div>
            <div class="duck-head">
              <div class="duck-eye"></div>
              <div class="duck-beak"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- LECTURES -->
  <div class="page" id="page-lectures">
    <p class="page-title">강의</p>
    <div class="course-grid" id="lecture-grid"></div>
  </div>

  <!-- PROJECTS -->
  <div class="page" id="page-projects">
    <p class="page-title">프로젝트</p>
    <div class="proj-grid" id="project-grid"></div>
  </div>

  <!-- ACCESS -->
  <div class="page" id="page-access">
    <p class="page-title">접속 안내</p>
    <div class="access-card" style="--card-color:#FF9F0A">
      <div class="access-qr"><img src="28qiO.jpg" alt="QR 코드"></div>
      <div class="access-info">
        <h2>LEC 강의실 바로가기</h2>
        <p>QR코드를 스캔하거나 아래 주소로 접속하세요.</p>
        <span class="access-url">https://feelmydream80-sys.github.io/lec/</span>
      </div>
    </div>
  </div>

</div>

<script>
const courses = [
  {
    folder: 'ViveCodingIntro',
    name: 'Vibe Coding 입문',
    desc: 'AI에게 말로 지시해서 앱을 만드는 새로운 개발 패러다임을 배웁니다',
    accent: '#4fffb0',
    icon: '🎯'
  },
  {
    folder: 'KidsSafty',
    name: 'Kids Safe AI',
    desc: '어린이를 위한 안전한 AI 활용 교육. AI의 위험성과 올바른 사용법을 알아봅니다',
    accent: '#ff6b6b',
    icon: '🛡️'
  },
];

const projects = [
  {
    name: 'Power Papers',
    desc: '전력·에너지 최신 arXiv 논문을 한국어 요약과 함께 큐레이션',
    url: 'https://feelmydream.pythonanywhere.com/',
    accent: '#4fffb0',
    icon: '⚡',
    tag: 'Python · Flask'
  },
  {
    name: '상산고 급식 영양 분석',
    desc: '박민수 학생 작품 — AI로 급식 메뉴의 영양 성분 분석',
    url: 'https://feelmydream80-sys.github.io/sangsan_meal/',
    accent: '#ffca3a',
    icon: '🍱',
    tag: 'HTML · CSS · JS'
  },
  {
    name: 'Kids Safe AI',
    desc: 'AI로 아이 안전을 지키는 스마트 안전 지킴이 앱',
    url: 'https://feelmydream80-sys.github.io/kidssaft/',
    accent: '#ff6b6b',
    icon: '🛡️',
    tag: 'Python'
  },
  {
    name: 'EMF Calculator',
    desc: '전자파 수치를 계산하는 웹 기반 전자파 계산기',
    url: 'https://feelmydream80-sys.github.io/EMF-Calculator/',
    accent: '#c77dff',
    icon: '🧮',
    tag: 'JavaScript · HTML'
  }
];

function buildHomeCards() {
  const cnt = courses.length;
  document.getElementById('tab-course-cnt').textContent = cnt;
  document.getElementById('quick-course-cnt').textContent = cnt;
  document.getElementById('scroll-course-cnt').textContent = cnt;

  const courseRow = document.getElementById('home-course-row');
  if (cnt === 0) {
    courseRow.innerHTML = '<div class="empty-hcard"><span>강의 준비 중</span><p>곧 오픈될 예정이에요</p></div>';
  } else {
    courseRow.innerHTML = '';
    courses.forEach(c => {
      const card = document.createElement('div');
      card.className = 'h-card';
      card.style.setProperty('--card-color', '#0071E3');
      card.onclick = () => { window.location.href = c.folder + '/'; };
      card.innerHTML =
        '<div class="h-card-top"><span class="h-card-icon">' + c.icon + '</span><span class="status on">진행중</span></div>' +
        '<p class="h-card-name">' + c.name + '</p>' +
        '<p class="h-card-desc">' + c.desc + '</p>';
      courseRow.appendChild(card);
    });
    const add = document.createElement('div');
    add.className = 'h-card';
    add.style.cssText = 'border-style:dashed;cursor:default;';
    add.innerHTML = '<div class="h-card-top"><span class="h-card-icon">＋</span><span class="status soon">준비중</span></div><p class="h-card-name">더 많은 강의</p><p class="h-card-desc">새로운 강의가 곧 추가될 예정입니다</p>';
    courseRow.appendChild(add);
  }

  const projRow = document.getElementById('home-proj-row');
  projRow.innerHTML = '';
  projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'h-card';
    card.style.setProperty('--card-color', '#34C759');
    card.onclick = () => { window.open(p.url, '_blank', 'noopener'); };
    card.innerHTML =
      '<div class="h-card-top"><span class="h-card-icon">' + p.icon + '</span><span class="status on">진행중</span></div>' +
      '<p class="h-card-name">' + p.name + '</p>' +
      '<p class="h-card-desc">' + p.desc + '</p>';
    projRow.appendChild(card);
  });
  const pAdd = document.createElement('div');
  pAdd.className = 'h-card';
  pAdd.style.cssText = 'border-style:dashed;cursor:default;';
  pAdd.innerHTML = '<div class="h-card-top"><span class="h-card-icon">＋</span><span class="status soon">준비중</span></div><p class="h-card-name">더 많은 프로젝트</p><p class="h-card-desc">새로운 프로젝트가 곧 추가될 예정입니다</p>';
  projRow.appendChild(pAdd);
}

function buildLectureGrid() {
  const grid = document.getElementById('lecture-grid');
  courses.forEach(c => {
    const card = document.createElement('a');
    card.href = c.folder + '/';
    card.className = 'course-card';
    card.style.setProperty('--card-color', '#0071E3');
    card.innerHTML =
      '<div class="course-top"><div class="course-icon" style="color:' + c.accent + '">' + c.icon + '</div><span class="status on">진행중</span></div>' +
      '<p class="course-name" style="color:' + c.accent + '">' + c.name + '</p>' +
      '<p class="course-desc">' + c.desc + '</p>';
    grid.appendChild(card);
  });
  if (courses.length === 0) {
    grid.innerHTML = '<div class="empty-box"><div class="ei">🎓</div><div class="et">아직 등록된 강의가 없습니다</div><div class="es">곧 새 강의가 오픈될 예정입니다</div></div>';
  }
}

function buildProjectGrid() {
  const grid = document.getElementById('project-grid');
  projects.forEach(p => {
    const card = document.createElement('a');
    card.href = p.url;
    card.target = '_blank';
    card.rel = 'noopener';
    card.className = 'proj-card';
    card.style.setProperty('--card-color', '#34C759');
    card.innerHTML =
      '<div class="proj-top"><div class="proj-icon" style="color:' + p.accent + '">' + p.icon + '</div><span class="status on">진행중</span></div>' +
      '<p class="proj-name" style="color:' + p.accent + '">' + p.name + '</p>' +
      '<p class="proj-desc">' + p.desc + '</p>' +
      '<span class="proj-tag">' + p.tag + '</span>';
    grid.appendChild(card);
  });
}

function goTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="' + name + '"]').classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => goTab(btn.dataset.tab));
});

buildHomeCards();
buildLectureGrid();
buildProjectGrid();

// Hidden ducks
const container = document.querySelector('.pages');
const hiddenDucks = [
  { top: '10%', left: '6%', size: 's', op: 0.14 },
  { top: '16%', right: '12%', size: 's', op: 0.18 },
  { top: '28%', left: '3%', size: 'm', op: 0.12 },
  { top: '36%', right: '5%', size: 's', op: 0.2 },
  { top: '48%', left: '12%', size: 'l', op: 0.12 },
  { top: '55%', right: '3%', size: 'm', op: 0.16 },
  { top: '63%', left: '7%', size: 's', op: 0.14 },
  { top: '72%', right: '15%', size: 'm', op: 0.18 },
  { top: '82%', left: '35%', size: 'l', op: 0.13 },
  { bottom: '10%', left: '12%', size: 's', op: 0.22 },
];
let foundCount = 0;

hiddenDucks.forEach((d) => {
  const duck = document.createElement('div');
  duck.className = 'hidden-duck';
  const style = 'position:absolute;z-index:5;cursor:pointer;opacity:' + d.op + ';transition:opacity 0.3s;';
  const pos = [];
  if (d.top !== undefined) pos.push('top:' + d.top);
  if (d.left !== undefined) pos.push('left:' + d.left);
  if (d.right !== undefined) pos.push('right:' + d.right);
  if (d.bottom !== undefined) pos.push('bottom:' + d.bottom);
  duck.setAttribute('style', style + pos.join(';'));
  duck.innerHTML =
    '<div class="hd-body ' + d.size + '"><div class="hd-head"><div class="hd-beak"></div></div></div>' +
    '<div class="hd-found">😵</div>';

  duck.addEventListener('click', function(e) {
    if (this.classList.contains('found')) return;
    this.classList.add('found');
    foundCount++;

    const rect = this.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    confetti({
      particleCount: 40,
      spread: 50,
      origin: { x: cx / window.innerWidth, y: cy / window.innerHeight },
      colors: ['#ffca3a', '#ff9f43', '#4fffb0', '#48dbfb', '#ff6b6b'],
      ticks: 60
    });

    const txt = document.createElement('div');
    txt.className = 'gotcha-text';
    txt.textContent = '걸렸다!';
    txt.style.left = rect.left + 'px';
    txt.style.top = (rect.top - 10) + 'px';
    document.body.appendChild(txt);
    setTimeout(() => txt.remove(), 1000);

    if (foundCount === hiddenDucks.length) {
      setTimeout(() => {
        confetti({ particleCount: 150, spread: 100, origin: { x: 0.5, y: 0.3 } });
        confetti({ particleCount: 150, spread: 100, origin: { x: 0.5, y: 0.7 } });
      }, 500);
    }
  });

  container.appendChild(duck);
});
</script>
</body>
</html>
