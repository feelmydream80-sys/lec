<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEC 강의실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: rgba(255,255,255,0.35);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
.glow-orb {
  position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.1;
}
.glow-1 { width: 500px; height: 500px; top: -150px; left: -150px; background: #4fffb0; }
.glow-2 { width: 400px; height: 400px; bottom: -150px; right: -150px; background: #c77dff; }
.container {
  position: relative; z-index: 1;
  width: 100%; max-width: 1100px;
  padding: 60px 32px 80px;
}
.header {
  text-align: center; margin-bottom: 56px;
}
.header h1 {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 900; letter-spacing: -0.03em;
  margin-bottom: 8px;
}
.header h1 span { color: #4fffb0; }
.header p {
  font-size: 15px; color: var(--muted);
  font-weight: 300; letter-spacing: 0.05em;
}
.header .count-badge {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 16px;
  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.18em;
  color: var(--muted);
}
.course-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
.course-card {
  background: rgba(12,12,16,0.85);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px 28px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(40px);
  transition: all 0.3s ease;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
}
.course-card::before {
  content: '';
  position: absolute;
  top: 0; left: 28px; right: 28px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent, #4fffb0), transparent);
  opacity: 0.5;
}
.course-card:hover {
  border-color: rgba(255,255,255,0.15);
  transform: translateY(-3px);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 20px 40px rgba(0,0,0,0.4);
}
.course-card:active {
  transform: translateY(-1px);
}
.card-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin-bottom: 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
}
.card-title {
  font-size: 20px; font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.card-sub {
  font-size: 13px; color: var(--muted);
  font-weight: 300; line-height: 1.6;
  flex: 1;
  margin-bottom: 20px;
}
.card-btn {
  display: inline-flex; align-items: center; gap: 8px;
  align-self: flex-start;
  padding: 8px 20px;
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: 0.12em;
  background: var(--accent, #4fffb0);
  color: #060608;
  border: none;
  transition: all 0.2s ease;
  text-transform: uppercase;
}
.course-card:hover .card-btn {
  box-shadow: 0 0 24px rgba(var(--accent-rgb, 79,255,176), 0.3);
}
.card-bg-num {
  position: absolute;
  bottom: -8px; right: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 100px;
  font-weight: 700;
  color: rgba(255,255,255,0.02);
  line-height: 1;
  pointer-events: none;
  letter-spacing: -0.05em;
}
.footer {
  text-align: center;
  margin-top: 48px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.12);
  letter-spacing: 0.15em;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
.anim-1 { animation-delay: 0.05s; }
.anim-2 { animation-delay: 0.12s; }
.anim-3 { animation-delay: 0.2s; }
.anim-4 { animation-delay: 0.3s; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"><div class="glow-orb glow-1"></div><div class="glow-orb glow-2"></div></div>
<div class="container">
  <div class="header anim anim-1">
    <h1><span>LEC</span> 강의실</h1>
    <p>AI 시대, 당신의 아이디어를 현실로 만드는 강의들</p>
    <div class="count-badge">📚 총 <span id="course-count">0</span>개 강의</div>
  </div>
  <div class="course-grid" id="course-grid"></div>
  <div class="footer">© 2026 LEC</div>
</div>
<script>
const courses = [
  {
    folder: 'ViveCodingIntro',
    name: 'Vibe Coding 입문',
    desc: 'AI에게 말로 지시해서 앱을 만드는<br>새로운 개발 패러다임을 배웁니다',
    accent: '#4fffb0',
    accentRgb: '79,255,176',
    icon: '🎯'
  },
  {
    folder: 'KidsSafty',
    name: 'Kids Safe AI',
    desc: '어린이를 위한 안전한 AI 활용 교육.<br>AI의 위험성과 올바른 사용법을 알아봅니다',
    accent: '#ff6b6b',
    accentRgb: '255,107,107',
    icon: '🛡️'
  }
];

document.getElementById('course-count').textContent = courses.length;

const grid = document.getElementById('course-grid');
courses.forEach((c, i) => {
  const card = document.createElement('a');
  card.href = c.folder + '/';
  card.className = 'course-card anim anim-' + Math.min(i + 1, 4);
  card.style.setProperty('--accent', c.accent);
  card.style.setProperty('--accent-rgb', c.accentRgb);
  card.innerHTML =
    '<div class="card-bg-num">' + String(i + 1).padStart(2, '0') + '</div>' +
    '<div class="card-icon">' + c.icon + '</div>' +
    '<div class="card-title" style="color:' + c.accent + '">' + c.name + '</div>' +
    '<div class="card-sub">' + c.desc + '</div>' +
    '<div class="card-btn" style="background:' + c.accent + '">시작하기 ▶</div>';
  grid.appendChild(card);
});
</script>
</body>
</html>
